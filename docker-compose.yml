services:
  # Servidor do seu Sistema de Estoque (CodeIgniter 4)
  app:
    build: .
    container_name: ci4_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    restart: always

  # Banco de Dados MySQL
  db:
    image: mysql:8.0
    container_name: ci4_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistema_estoque
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  # Interface Visual do Banco de Dados
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ci4_phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_ARBITRARY=1
    restart: always

volumes:
  db_data: